# Tuesday — docker-compose for local/cloud deployment
#
# Usage:
#   cp .env.example .env  # fill in your keys
#   docker compose up --build
#
# Access Tuesday at http://localhost:8000

services:
  tuesday:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist knowledge (Tuesday's brain) and sessions across deploys
      - ./knowledge:/app/knowledge
      - ./backend/sessions:/app/backend/sessions
      - ./backend/logs:/app/backend/logs
      - ./backend/uploads:/app/backend/uploads
      - ./backend/briefings:/app/backend/briefings
      - ./backend/outputs:/app/backend/outputs
      # OAuth tokens (Google, Microsoft) — persist across rebuilds
      - ./backend/app/secrets:/app/backend/app/secrets
      # Mind Castle agent data
      - ./backend/agents:/app/backend/agents
      # Uploaded presentation templates
      - ./backend/templates:/app/backend/templates
    restart: unless-stopped
